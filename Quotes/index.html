<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quote App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
     <script src="https://kit.fontawesome.com/8e98006f77.js"></script>
 <link rel="stylesheet" href="style.css"> 
    </head>
  <body style="height: 100vh; background:#0d0d0d; color:white; ">
    <nav class="navbar bg-body-tertiary">
  <div class="container">
    <a class="navbar-brand">Quote</a>
    <form class="d-flex" role="search">
<a href="liked.html" class="btn btn-outline-success">Liked</a>
    </form>
  </div>
</nav>
    <div class="h-100 container d-flex justify-content-center align-items-center flex-column">
           


    <div id="cards" class="card p-3 shadow ">
    

    <div class="quote">
     <p id="quote-name" class="fw-bold fs-3 mt-2"></p>
    </div>

   

    <div class="author">
     <p id="author-name" class="fw-medium ">Lorem, ipsum dolor.</p>
    </div>
  </div>






           <div class="d-flex justify-content-center flex-row gap-3 mt-5">
<button id="btn-pre" class="btn btn-outline-secondary"><i class="fa-light fa-circle-left me-1"></i>Previous</button>
<button id="btn-like" class="btn btn-outline-info ">Like <i class="fa-light fa-thumbs-up ms-1"></i></button>
<button id="btn-next" class="btn btn-outline-primary">Next<i class="fa-light fa-circle-right ms-2"></i></button>
           </div>                    

    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
 <script src="script.js"></script>
</body>
</html>
