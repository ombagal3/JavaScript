<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
<div class="container mt-5 bg-danger d-flex justify-content-center flex-column">
    <div><h1 class="text-center" id="count">0</h1></div>

</div>
 <div class="text-center mt-5">
        <button id="btn-1" class="btn btn-primary ">++</button>
         <button id="btn-2" class="btn btn-primary ">--</button>
           <button id="btn-3" class="btn btn-primary ">*</button>
            <button id="btn-4" class="btn btn-primary ">0</button>
             <button id="btn-5" class="btn btn-primary ">2%</button>
          <button id="btn-6" class="btn btn-primary ">2/</button>
        </div>

        <div class="container mt-5 d-flex justify-content-center align-content-center ">
            <div>
                <input type="text" id="name-in">
                <button class="btn btn-primary" id="find">find</button>
            </div>
        </div>

        <div class="d-flex justify-content-center text-center">

          <button id="bg-btn" class=" btn btn-secondary">Bg Color</button>
        </div>
    <script src="script.js"> </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
